name: Daily WB LINKBOX AI Agent

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run AI Automation Script
        env: # Inject the secrets securely here!
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_SECRET_TOKEN: ${{ secrets.AI_SECRET_TOKEN }}
        run: python ai_agent.py
