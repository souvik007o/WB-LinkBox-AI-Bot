name: Daily WB LINKBOX AI Agent

on:
  schedule:
    # Runs every day at 12:00 AM UTC (5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 🟢 FIXED: Updated to v4 to clear the warning

      - name: Setup Python
        uses: actions/setup-python@v5 # 🟢 FIXED: Updated to v5 to clear the warning
        with:
          python-version: '3.10'

      - name: Verify Files (Debugger)
        run: ls -la # 🟢 This prints out all the files so we can see if the name matches!

      - name: Run AI Automation Script
        env: 
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_SECRET_TOKEN: ${{ secrets.AI_SECRET_TOKEN }}
        run: python ai_agent.py
